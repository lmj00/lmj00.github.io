name: Generate AI study post

on:
  schedule:
    # KST 06:00 = UTC 21:00 (전날). 출근 전에 새 글이 준비되도록.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      topic_id:
        description: "특정 주제 강제 생성(sources.json의 id). 비우면 다음 미생성 주제 자동 선택."
        required: false
        default: ""

permissions:
  contents: write   # 새 글 커밋/푸시
  pages: write      # 네이티브 Pages 빌드 요청

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install d2 (다이어그램 렌더러)
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Install python deps
        working-directory: generator
        run: pip install -r requirements.txt

      - name: Generate post
        working-directory: generator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FORCE_TOPIC_ID: ${{ github.event.inputs.topic_id }}
        run: python main.py

      - name: Commit new post
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ai-notes/ generator/state/topics_done.json
          git add assets/diagrams/ 2>/dev/null || true   # 다이어그램 없는 날 대비
          if git diff --staged --quiet; then
            echo "새 글 없음 — 커밋/배포 생략"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            NEW=$(ls -t _posts/ai-notes/*.md | head -1)
            TITLE=$(grep -m1 '^title:' "$NEW" | sed -E 's/^title:[[:space:]]*"?//; s/"?[[:space:]]*$//')
            git commit -m "ai-notes: ${TITLE:-자동 생성 글}"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # 소스가 "Deploy from a branch(master)"인 네이티브 Pages 빌드는
      # 봇(GITHUB_TOKEN) 커밋으로는 자동 트리거되지 않을 수 있으므로,
      # 새 글이 생겼을 때 명시적으로 빌드를 요청한다.
      - name: Request Pages build
        if: steps.commit.outputs.committed == 'true'
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
