name: Generate AI study post

on:
  schedule:
    # KST 06:00 = UTC 21:00 (전날). 출근 전에 새 글이 준비되도록.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      topic_id:
        description: "특정 주제 강제 생성(sources.json의 id). 비우면 다음 미생성 주제 자동 선택."
        required: false
        default: ""

permissions:
  contents: write   # 새 글 커밋/푸시
  pages: write      # Pages 배포
  id-token: write

# build-jekyll과 같은 그룹 → 동시 배포 충돌/취소 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 생성 → 커밋 → 빌드 → 배포를 한 잡에서 처리한다.
  # (자동 커밋은 GITHUB_TOKEN이라 다른 워크플로우를 못 깨우므로 직접 배포)
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install d2 (다이어그램 렌더러)
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Install python deps
        working-directory: generator
        run: pip install -r requirements.txt

      - name: Generate post
        working-directory: generator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FORCE_TOPIC_ID: ${{ github.event.inputs.topic_id }}
        run: python main.py

      - name: Commit new post
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ai-notes/ generator/state/topics_done.json
          git add assets/diagrams/ 2>/dev/null || true   # 다이어그램 없는 날 대비
          if git diff --staged --quiet; then
            echo "새 글 없음 — 커밋/배포 생략"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            NEW=$(ls -t _posts/ai-notes/*.md | head -1)
            TITLE=$(grep -m1 '^title:' "$NEW" | sed -E 's/^title:[[:space:]]*"?//; s/"?[[:space:]]*$//')
            git commit -m "ai-notes: ${TITLE:-자동 생성 글}"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # 새 글이 있을 때만 빌드·배포
      - id: pages
        if: steps.commit.outputs.committed == 'true'
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        if: steps.commit.outputs.committed == 'true'
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        if: steps.commit.outputs.committed == 'true'
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.commit.outputs.committed == 'true'
        uses: actions/deploy-pages@v4
