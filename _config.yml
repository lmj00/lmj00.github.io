# If you want to link only specific pages in your header, uncomment
# this and add the path to the pages in order as they should show up
#header_pages:
# - about.md

# Build settings
theme: minima

# minima 2.5.1 내부 SCSS의 옛 '/' 나눗셈 deprecation 경고 침묵
# (테마 코드 문제라 우리가 고칠 수 없음 → 의존성 경고만 숨김)
sass:
  quiet_deps: true

plugins:
 - jekyll-feed
 - jekyll-seo-tag
 - jekyll-paginate

future: true

paginate: 8
paginate_path: "/page:num/"

permalink: /:categories/:title

# 생성기는 사이트 빌드 대상에서 제외 (LLM 스크립트는 Jekyll이 렌더링하지 않음)
exclude:
  - generator/
  - Gemfile
  - Gemfile.lock
  - vendor/